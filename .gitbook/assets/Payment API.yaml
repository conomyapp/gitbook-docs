  /payments/available-products:
    get:
      summary: Get available products
      deprecated: false
      description: >-
        Returns all payment products available for a given identity, organized
        by currency. Each currency entry includes available pay-in methods with
        their products and pay-out (withdrawal) methods with their products.
        Use this endpoint to discover what payment rails are enabled for an
        account before building a payment flow.
      operationId: get-available-products
      tags:
        - Payment-methods
      parameters:
        - name: identityId
          in: query
          description: Identity ID to retrieve available products for.
          required: false
          schema:
            type: string
        - name: currencies
          in: query
          description: >-
            Comma-separated list of currency codes to filter results
            (e.g., `ARS,CLP`).
          required: false
          schema:
            type: string
        - name: x-api-key
          in: header
          description: >-
            The API key used for authentication when making requests to the API
            Gateway.
          required: true
          example: ''
          schema:
            type: string
        - name: User-Agent
          in: header
          description: Identifies the application making the request.
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: Request processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/available-products'
              example:
                supportedPaymentCurrencies:
                  - ARS
                  - CLP
                supportedPayoutCurrencies:
                  - ARS
                  - CLP
                supportedPaymentMethods:
                  - CVU
                  - ETPAY
                  - PCT
                  - PIX
                supportedWithdrawalMethods:
                  - BANK_ACCOUNT
                byCurrency:
                  - currency: ARS
                    payin:
                      paymentMethods:
                        - CVU
                        - PCT
                      products:
                        - name: PCT
                          type: PCT
                          currency: ARS
                          product: ARS:ARS
                          minAmount: '10'
                          maxAmount: '5000000'
                          requiredFields:
                            - pct.customer.phoneNumber
                            - pct.customer.phoneNumberPrefix
                            - pct.customer.email
                          validDestinations:
                            - ACCOUNT
                          nodeSchema:
                            pct:
                              customer:
                                email: string
                                phoneNumber: string
                                phoneNumberPrefix: string
                          requiredFieldTypes:
                            pct.customer.email: string
                            pct.customer.phoneNumber: string
                            pct.customer.phoneNumberPrefix: string
                    payout:
                      withdrawalMethods:
                        - BANK_ACCOUNT
                      products:
                        - name: BANK_ACCOUNT
                          type: BANK_ACCOUNT
                          currency: ARS
                          product: ARS:ARS
                          minAmount: '10'
                          maxAmount: '5000000'
                          requiredFields:
                            - bank.accountNumber
                            - bank.bank
                          validOrigins:
                            - ACCOUNT
                          nodeSchema:
                            bank:
                              accountNumber: string
                              bank: string
                          requiredFieldTypes:
                            bank.accountNumber: string
                            bank.bank: string
          headers: {}
        '400':
          $ref: '#/components/responses/Bad request'
          description: Invalid request parameters or payload.
        '500':
          $ref: '#/components/responses/Internal server error'
          description: Unexpected internal server error.
      security:
        - BearerToken: []
