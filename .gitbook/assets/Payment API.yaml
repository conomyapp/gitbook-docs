    available-products:
      type: object
      description: Available payment products for an identity, organized by currency.
      properties:
        supportedPaymentCurrencies:
          type: array
          description: Currencies for which pay-in products are available.
          items:
            $ref: '#/components/schemas/currency'
        supportedPayoutCurrencies:
          type: array
          description: Currencies for which pay-out products are available.
          items:
            $ref: '#/components/schemas/currency'
        supportedPaymentMethods:
          type: array
          description: All pay-in node types available across all currencies.
          items:
            $ref: '#/components/schemas/payment-node-type'
        supportedWithdrawalMethods:
          type: array
