                  value: '0.5'
          headers: {}
        '400':
          $ref: '#/components/responses/Bad request'
          description: Invalid request parameters or payload.
        '500':
          $ref: '#/components/responses/Internal server error'
          description: Unexpected internal server error.
      security:
        - BearerToken: []
    get:
      summary: Get customers
      deprecated: false
      description: Lists customers with filtering and pagination options.
      operationId: get-customers
      tags:
        - Customers
      parameters:
        - name: id
          in: query
          description: '   Comma separated id to list customers for.'
          required: false
          example: ''
          schema:
            type: string
        - name: type
          in: query
          description: '   Comma separated type to list customers for.'
          required: false
          example: ''
          schema:
            type: string
        - name: identityId
          in: query
          description: '   Comma separated identityId to list customers for.'
          required: false
          example: ''
          schema:
            type: string
        - name: limit
          in: query
          description: Specifies the maximum number of items to return in a single request.
          required: false
          example: 0
          schema:
            type: integer
        - name: next
          in: query
          description: A cursor indicating the position of the last retrieved item.
          required: false
          example: 0
          schema:
            type: integer
        - name: offset
          in: query
          description: A cursor indicating how many items to skip from the request
          required: false
          example: 0
          schema:
            type: integer
        - name: x-api-key
          in: header
          description: >-
            The API key used for authentication when making requests to the API
            Gateway.
          required: true
          example: ''
          schema:
            type: string
        - name: User-Agent
          in: header
          description: Identifies the application making the request.
          required: true
          example: ConomyApp
          schema:
            type: string
      responses:
        '200':
          description: Request processed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    $ref: '#/components/schemas/pagination-cursor'
                    description: Pagination cursor object
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/customer'
                    description: Items from the current page
                required:
                  - results
                  - pagination
          headers: {}
        '400':
          $ref: '#/components/responses/Bad request'
          description: Invalid request parameters or payload.
        '500':
          $ref: '#/components/responses/Internal server error'
          description: Unexpected internal server error.
      security:
        - BearerToken: []
components:
  schemas:
    card:
      description: Card payment node payload for card-based pay-ins.
      type: object
      properties:
        holder:
          type: string
          description: Card holder full name
        expiryMonth:
          type: string
          description: Expiry month of the card
        expiryYear:
          type: string
          description: Expiry year of the card
        scheme:
          type: string
          description: Card scheme
        type:
          type: string
          description: Card type
        pan:
          type: string
          description: card number
        mask:
          type: string
          description: Last 4 digits
        country:
          type: string
          description: Issuing country
        token:
          type: string
          description: Card token
      required:
        - token
      title: ''
    payment-link:
      description: Configuration and metadata for a reusable payment link.
      type: object
      properties:
        id:
          type: string
          description: ID
        URL:
          type: string
          description: Payment link URL
        token:
          type: string
          description: Token for security authentication
        customer:
          $ref: '#/components/schemas/customer'
        paymentMethodsAllowed:
          type: array
          items:
            type: string
          description: Allowed payment methods.
        paymentMethod:
          description: Customer payment method
        expiredAt:
          type: string
          description: When the link expires
        metadata:
          type: object
          properties:
            description:
              type: string
              description: Description of the payment
          required:
            - description
          description: Payment link metadata
        redirectURL:
          type: string
          description: >-
            The URL to which the end user will be redirected after completing
            the payment. 
      required:
        - metadata
        - redirectURL
        - paymentMethodsAllowed
        - id
    pix:
      description: PIX rail payload for Brazil pay-ins and payouts.
      type: object
      properties:
        data:
          type: string
          description: >-
            The actual PIX code (EMV-compliant string) that represents the
            payment. This is what is known as the 'PIX' in Brazil and can be
            copied and pasted instead of scanning.
        qrCode:
          type: string
          description: The rendered QR code string that can be scanned for PIX payments.
        expiredAt:
          type: string
          format: date-time
          description: The expiration date and time of the QR code. UTC format.
        instructions:
          type: string
          description: >-
            Optional instructions displayed to the user for completing the PIX
            payment.
        customer:
          type: object
          description: Details of the customer initiating the payment.
          properties:
            id:
              $ref: '#/components/schemas/_id'
            firstName:
              type: string
              description: Payer's name
            email:
              type: string
              description: Payer's email
            lastName:
              type: string
              description: Payer's last name
            phoneNumber:
              type: string
              description: Payer's phone number without prefix
            phoneNumberPrefix:
              type: string
              description: Phone number prefix (e.g., +57)
            documentType:
              $ref: '#/components/schemas/document-type'
            documentNumber:
              type: string
              description: The document number associated with the documentType
            address:
              $ref: '#/components/schemas/address'
          required:
            - firstName
        successUrl:
          type: string
          description: Redirect url in case of success
        failedUrl:
          type: string
          description: Redirect url in case of failure
      required:
        - data
        - customer
    pct:
      description: PCT rail payload for Argentina QR pay-ins.
      type: object
      properties:
        qrCode:
          type: string
          description: >-
            The QR code string that can be rendered or scanned for interoperable
            transfer payments in Argentina under the BCRA's PCT (Transfer QR)
            standard.
        customer:
          $ref: '#/components/schemas/customer'
        successUrl:
          type: string
          description: Redirect url in case of success
        failedUrl:
          type: string
          description: Redirect url in case of failure
      required:
        - customer
    etpay:
      description: Etpay open-banking payload for Chile pay-ins.
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/customer'
        url:
          type: string
        redirectUrl:
          type: string
          deprecated: true
        expiresAt:
          type: string
          format: time
        token:
          type: string
        signatureToken:
          type: string
        successUrl:
          type: string
          description: Redirect url in case of success
        failedUrl:
          type: string
          description: Redirect url in case of failure
    wompi:
      description: Wompi gateway payload for Colombia pay-ins.
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/customer'
        url:
          type: string
        redirectUrl:
          type: string
        expiresAt:
          type: string
        token:
          type: string
        signatureToken:
          type: string
    card-wrapper:
      description: Wrapper object exposing the `card` node payload.
      type: object
      properties:
        card:
          type: object
          properties:
            holder:
              type: string
              description: Card holder full name
            scheme:
              type: string
              description: Card scheme
            type:
              type: string
              description: Card type
            mask:
              type: string
              description: Last 4 digits
            country:
              type: string
              description: Issuing country
            token:
              type: string
              description: Card token
          required:
            - token
      title: CARD
      required:
        - card
    etpay-wapper:
      description: Wrapper object exposing the `etpay` node payload.
      type: object
      properties:
        etpay:
          $ref: '#/components/schemas/etpay'
      required:
        - etpay
      title: ETPAY
    wompi-wapper: &ref_0
      description: Wrapper object exposing the `wompi` node payload.
      type: object
      properties:
        wompi:
          $ref: '#/components/schemas/wompi'
      title: WOMPI
    account-wrapper:
      description: Wrapper object exposing the internal `account` node payload.
      type: object
      properties:
        account:
          type: object
          properties:
            type:
              description: The type of internal account.
              $ref: '#/components/schemas/account-type'
            currency:
              description: >-
                The currency in which the internal account operates. Please
                check "currencies" page.
              $ref: '#/components/schemas/currency'
            accountNumber:
              type: string
              description: Internal reference number for the account.
            accountHolder:
              type: string
              description: Name of the entity or user owning the internal account.
          required:
            - type
            - currency
            - accountNumber
            - accountHolder
      title: ACCOUNT
      required:
        - account
    bank-account-wrapper: &ref_1
      description: Wrapper object exposing the external `bank` node payload.
      type: object
      properties:
        bank:
          type: object
          properties:
            accountNumber:
              type: string
              description: The bank account number.
            bank:
              type: string
              description: The name of the bank where the account is held.
            currency:
              $ref: '#/components/schemas/currency'
            typeAccount:
              type: string
              description: The type of bank account. CHECKING_ACOUNT, SAVINGS
            accountHolder:
              type: string
              description: The full name of the account holder.
            accountHolderDni:
              type: string
              description: >-
                The national identification number or tax ID of the account
                holder.
            country:
              $ref: '#/components/schemas/country'
          required:
            - accountNumber
            - bank
            - currency
            - accountHolder
            - accountHolderDni
            - country
      title: BANK_ACCOUNT
      required:
        - bank
    wallet-wrapper: &ref_2
      description: Wrapper object exposing the `wallet` node payload for crypto transfers.
      type: object
      properties:
        wallet:
          type: object
          properties:
            provider:
              type: string
              description: Optional wallet provider identifier (for routing/integration).
            referenceId:
              type: string
              description: Optional external wallet identifier in the provider system.
            token:
              type: string
              description: Optional token symbol (e.g., `USDC`, `USDT`) when not implied by `currency`.
            network:
              type: string
              description: Optional blockchain network (e.g., `ETH`, `TRON`, `SOLANA`).
            address:
              type: string
              description: Wallet's address
          required:
            - address
      required:
        - wallet
      title: CRYPTO
    crypto-wrapper:
      description: Dedicated wrapper for CRYPTO nodes. Holds the `wallet` payload.
      allOf:
        - $ref: '#/components/schemas/wallet-wrapper'
      title: CRYPTO
    pix-wrapper:
