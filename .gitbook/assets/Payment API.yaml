        - identityId
    create-payment-body:
      description: Request body schema for creating a payment.
      type: object
      properties:
        externalId:
          type: string
          description: External reference identifier for integrations.
        identityId:
          type: string
          description: >-
            Identifier linking the transaction to a specific user or
            organization.
        identityExternalId:
          type: string
          description: >-
            External reference identifier for the identity associated with the
            transaction.
        accountNumber:
          type: string
          description: The account number involved in the transaction.
        currency:
          $ref: '#/components/schemas/currency'
        totalAmount:
          type: string
          description: The total amount of the transaction.
        description:
          type: string
          description: A brief description of the transaction.
        type:
          $ref: '#/components/schemas/payment-type'
        purchaseAmount:
          type: string
          description: The amount paid in the transaction.
        purchaseCurrency:
          $ref: '#/components/schemas/currency'
        expiresAt:
          type: string
          description: Timestamp indicating when the transaction expires, if applicable.
        origins:
          type: array
          description: A list of sources for the transaction.
          items:
            $ref: '#/components/schemas/payment-node'
        destinations:
          type: array
          description: A list of destinations for the transaction.
          items:
            $ref: '#/components/schemas/payment-node'
      required:
        - externalId
        - identityId
        - accountNumber
        - totalAmount
        - currency
        - type
    payment-type:
      type: string
      description: >-
        Indicates the purpose of the payment.

        This field defines how the payment should be processed within the
        system, based on its intent—such as funding an account, withdrawing
        funds, transferring between users, collecting funds, or applying fees.

        Go to the [payment types page](../payments/payment-types "mention") for
        the complete list of supported values.
      enum:
        - PURCHASE
        - TOPUP_ACCOUNT
        - WITHDRAWAL_ACCOUNT
        - P2P
        - COLLECT
        - FEE
        - REMITTANCE
      x-enumDescriptions:
        PURCHASE: Payment initiated by an external customer for goods or services.
        TOPUP_ACCOUNT: A deposit of funds into an internal account
        WITHDRAWAL_ACCOUNT: Funds withdrawn from an internal account to an external bank account.
        P2P: Pull of funds from another internal account.
        COLLECT: Pull of funds from another internal account.
        FEE: Fee charged or collected within the system.
        REMITTANCE: >-
          Crossborder payment from an internal or external account to receipient
          in another country.
    customer:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/_id'
        firstName:
          type: string
          description: Payer's name
        email:
          type: string
          description: Payer's email
        lastName:
          type: string
          description: Payer's last name
        phoneNumber:
          type: string
          description: Payer's phone number without prefix
        phoneNumberPrefix:
          type: string
          description: Phone number prefix (e.g., +57)
        documentType:
          $ref: '#/components/schemas/document-type'
        documentNumber:
          type: string
          description: The document number associated with the documentType
        address:
          $ref: '#/components/schemas/address'
      description: Information on who pays the transaction
      required:
        - firstName
    payment-node-type:
      type: string
      description: >-
        Defines the source or destination type of the payment. This field
        determines how the funds will be sent or received and which structure is
        expected in the corresponding `node` object. Only one type is allowed
        per node.


        | Type          | Node          | Country        | Direction        |

        |---------------|---------------|----------------|------------------|

        | `CARD`        | `card`        | Multi          | Pay-in           |

        | `CRYPTO`      | `wallet`      | Multi          | Pay-in / Pay-out |

        | `ACCOUNT`     | `account`     | Multi          | Pay-in / Pay-out |

        | `BANK_ACCOUNT`| `bank`        | Multi          | Pay-out          |

        | `PIX`         | `pix`         | Brazil         | Pay-in / Pay-out |

        | `PCT`         | `pct`         | Argentina      | Pay-in           |

        | `CVU`         | `cvu`         | Argentina      | Pay-in           |

        | `ETPAY`       | `etpay`       | Chile          | Pay-in           |

        | `FINTOC`      | `fintoc`      | Chile          | Pay-in           |

        | `WEBPAY`      | `webpay`      | Chile          | Pay-in           |

        | `SPEI`        | `spei`        | Mexico         | Pay-in / Pay-out |

        | `PSE`         | `pse`         | Colombia       | Pay-in           |

        | `BANCOLOMBIA` | `bancolombia` | Colombia       | Pay-in           |

        | `DAVIVIENDA`  | `davivienda`  | Colombia       | Pay-in           |

        | `DAVIPLATA`   | `daviplata`   | Colombia       | Pay-in / Pay-out |

        | `NEQUI`       | `nequi`       | Colombia       | Pay-in / Pay-out |

        | `BREB`        | `breb`        | Colombia       | Pay-out          |

        | `WOMPI`       | `wompi`       | Colombia       | Pay-in           |

        | `LIGO`        | `ligo`        | Peru           | Pay-in           |

        | `SIP`         | `sip`         | Peru, Bolivia  | Pay-in           |

        | `ACH`         | `ach`         | USA            | Pay-in / Pay-out |

        | `WIRE`        | `wire`        | USA            | Pay-out          |

        | `FEDNOW`      | `fedNow`      | USA            | Pay-in / Pay-out |

        | `RTP`         | `rtp`         | USA            | Pay-in           |

        | `SEPA`        | `sepa`        | Europe         | Pay-out          |

        | `FPE`         | `fpe`         | UK             | Pay-out          |

        | `SWIFT`       | `swift`       | Global         | Pay-out          |
      enum:
        - CARD
        - CRYPTO
        - ACCOUNT
        - BANK_ACCOUNT
        - PIX
        - PCT
        - CVU
        - ETPAY
        - FINTOC
        - WEBPAY
        - SPEI
        - PSE
        - BANCOLOMBIA
        - DAVIVIENDA
        - DAVIPLATA
        - NEQUI
        - BREB
        - WOMPI
        - LIGO
        - SIP
        - ACH
        - WIRE
        - FEDNOW
        - RTP
        - SEPA
        - FPE
        - SWIFT
      x-enumDescriptions:
        CARD: Represents a card payment. Opens the card node.
        CRYPTO: >-
          Cryptocurrency wallet rail (global). Supports both pay-in and pay-out
          flows. Opens the wallet node.
        ACCOUNT: Represents an internal platform account. Opens the account node.
        BANK_ACCOUNT: Generic external bank account for payouts. Opens the bank node.
        PIX: PIX QR code or copy-paste code in Brazil (BRL). Opens the pix node.
        PCT: Interoperable QR payment in Argentina (ARS) under BCRA PCT standard. Opens the pct node.
        CVU: Virtual account / CBU bank transfer pay-in in Argentina (ARS). Opens the cvu node.
        ETPAY: Open banking pay-in for Chile (CLP) via Etpay. Opens the etpay node.
        FINTOC: Open banking pay-in for Chile (CLP) via Fintoc widget. Opens the fintoc node.
        WEBPAY: Card payment in Chile (CLP) via Transbank. Opens the webpay node.
        SPEI: Electronic Interbank Payment System for Mexico (MXN). Opens the spei node.
        PSE: Online secure bank transfer pay-in for Colombia (COP). Opens the pse node.
        BANCOLOMBIA: Bancolombia direct payment pay-in for Colombia (COP). Opens the bancolombia node.
        DAVIVIENDA: Davivienda direct payment pay-in for Colombia (COP). Opens the davivienda node.
        DAVIPLATA: Daviplata mobile wallet for Colombia (COP). Opens the daviplata node.
        NEQUI: Nequi digital wallet for Colombia (COP). Opens the nequi node.
        BREB: Bank account transfer payout for Colombia (COP). Opens the breb node.
        WOMPI: Wompi payment gateway pay-in for Colombia (COP). Opens the wompi node.
        LIGO: QR-based payment system pay-in for Peru (PEN). Opens the ligo node.
        SIP: Interoperable payment system for Peru (PEN) and Bolivia (BOB). Opens the sip node.
        ACH: Automated Clearing House bank transfers for USA (USD). Opens the ach node.
        WIRE: Wire transfer via correspondent banks for USA (USD). Opens the wire node.
        FEDNOW: FedNow instant payment service for USA (USD). Opens the fedNow node.
        RTP: Real-time payments network pay-in for USA (USD). Opens the rtp node.
        SEPA: Single Euro Payments Area payout for Europe (EUR). Opens the sepa node.
        FPE: Faster Payments near-instant bank transfer payout for UK (GBP). Opens the fpe node.
        SWIFT: >-
          International bank wire transfer rail (global). Pay-out only.
          Opens the swift node.
