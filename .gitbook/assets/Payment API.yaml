    payment:
      type: object
      description: >-
        Schema representing a financial transaction, including details about the
        transaction's origins, destinations, amounts, fees, and status.
      properties:
        id:
          $ref: '#/components/schemas/_id'
        externalId:
          type: string
          description: External reference identifier for integrations.
        identityId:
          type: string
          description: >-
            Identifier linking the transaction to a specific user or
            organization.
        identityExternalId:
          type: string
          description: >-
            External reference identifier for the identity associated with the
            transaction.
        accountNumber:
          type: string
          description: The account number involved in the transaction.
        totalAmount:
          type: string
          description: The total amount of the transaction.
        currency:
          $ref: '#/components/schemas/currency'
        description:
          type: string
          description: A brief description of the transaction.
        product:
          type: string
          description: >-
            The product or service related to the transaction.
            purchaseCurrency:Currency
        status:
          type: string
          description: >-
            The current status of the transaction (e.g., PENDING, AUTHORIZED,
            CAPTURED, ATTEMPT, REFUNDED).
        type:
          $ref: '#/components/schemas/payment-type'
        purchaseAmount:
          type: string
          description: The amount paid in the transaction.
        purchaseCurrency:
          $ref: '#/components/schemas/currency'
        fees:
          type: array
          description: A list of fees associated with the transaction.
          items:
            $ref: '#/components/schemas/fee'
        createdAt:
          type: string
          description: Timestamp indicating when the transaction was created.
        updatedAt:
          type: string
          description: Timestamp indicating the last update to the transaction.
        expiresAt:
          type: string
          description: Timestamp indicating when the transaction expires, if applicable.
        capturedAt:
          type: string
          description: Timestamp indicating when the transaction was captured.
        authorizedAt:
          type: string
          description: Timestamp indicating when the transaction was authorized.
        refundedAt:
          type: string
          description: >-
            Timestamp indicating when the transaction was refunded, if
            applicable.
        origins:
          type: array
          description: A list of sources for the transaction.
          items:
            $ref: '#/components/schemas/payment-node'
        destinations:
          type: array
          description: A list of destinations for the transaction.
          items:
            $ref: '#/components/schemas/payment-node'
        settlement:
          type: string
          description: Settlement period for the transaction.
      required:
        - id
        - externalId
        - identityId
        - accountNumber
        - totalAmount
        - currency
        - status
        - type
        - createdAt
        - updatedAt
    payment-node:
      description: Payment node schema used in create/update payment requests.
      allOf:
        - type: object
          properties:
            externalId:
              type: string
              description: External reference identifier for integrations.
            name:
              type: string
              description: The name of the source or destination of the transaction.
            type:
              $ref: '#/components/schemas/payment-node-type'
            amount:
              type: string
              description: The amount involved in the transaction.
            currency:
              $ref: '#/components/schemas/currency'
            settlement:
              type: string
              description: Indicates the settlement period.
            fee:
              description: Details about any fees applied to the transaction.
              $ref: '#/components/schemas/fee'
            identity:
              type: object
              description: The entity associated with the source or destination.
              properties: {}
            metadata:
              type: object
              description: >-
                Additional metadata related to the transaction source or
                destination.
              properties:
                image:
                  type: string
                  description: An image representing the source or destination.
                description:
                  type: string
                  description: A brief description of the source or destination.
                category:
                  type: string
                  description: The category or grouping of the source or destination.
              required:
                - image
                - description
                - category
            amountOut:
              type: string
              description: Calculated amount - fees
          required:
            - type
            - currency
          $ref: '#/components/schemas/payment-node-base'
        - $ref: '#/components/schemas/node-wrapper'
      title: payment-node
    payment-node-get:
      description: Payment node schema returned by read/list endpoints.
      allOf:
        - type: object
          properties:
            name:
              type: string
              description: The name of the source or destination of the transaction.
            type:
              $ref: '#/components/schemas/payment-node-type'
            currency:
              $ref: '#/components/schemas/currency'
            product:
              type: string
              description: >-
                Product identifier for the payment rail, in the format
                `CURRENCY:CURRENCY` (e.g., `ARS:ARS`, `USD:COP`).
            settlement:
              type: string
              description: Indicates the settlement period.
            fee:
              description: Details about any fees applied to the transaction.
              $ref: '#/components/schemas/fee'
            metadata:
              type: object
              description: >-
                Additional metadata related to the transaction source or
                destination.
              properties:
                image:
                  type: string
                  description: An image representing the source or destination.
                description:
                  type: string
                  description: A brief description of the source or destination.
                category:
                  type: string
                  description: The category or grouping of the source or destination.
              required:
                - image
                - description
                - category
            minAmount:
              type: string
              description: Minimum transaction amount allowed for this node.
              pattern: ^\d+$
            maxAmount:
              type: string
              description: Maximum transaction amount allowed for this node.
              pattern: ^\d+$
            requiredFields:
              type: array
              description: >-
                Dot-notation paths of fields required when using this node
                (e.g., `bank.accountNumber`, `pct.customer.email`).
              items:
                type: string
            validOrigins:
              type: array
              description: >-
                Node types that are valid as origins when this node is used as a
                destination.
              items:
                $ref: '#/components/schemas/payment-node-type'
            validDestinations:
              type: array
              description: >-
                Node types that are valid as destinations when this node is used
                as an origin.
              items:
                $ref: '#/components/schemas/payment-node-type'
            nodeSchema:
              type: object
              description: >-
                Dynamic schema describing the structure of the node-specific
                object. Each key matches the node key (e.g., `bank`, `pct`,
                `cvu`) and its value reflects the expected field structure.
              additionalProperties: true
            requiredFieldTypes:
              type: object
              description: >-
                Map of dot-notation field paths to their expected types
                (e.g., `{ "bank.accountNumber": "string" }`).
              additionalProperties:
                type: string
          title: payment-node-get
          required:
            - type
            - currency
        - $ref: '#/components/schemas/node-wrapper-get'
      title: payment-node-get
    payment-node-base:
      description: Shared base fields for payment nodes (`type`, `currency`, `amount`).
      type: object
      properties:
        name:
          type: string
          description: The name of the source or destination of the transaction.
        type:
          $ref: '#/components/schemas/payment-node-type'
        externalId:
          type: string
          description: External reference identifier for integrations.
        amount:
          type: string
          description: The amount involved in the transaction.
        amountOut:
          type: string
          description: Calculated amount - fees
        currency:
          $ref: '#/components/schemas/currency'
        settlement:
          type: string
          description: Indicates the settlement period.
        fee:
          description: Details about any fees applied to the transaction.
          $ref: '#/components/schemas/fee'
        identity:
          type: object
          description: The entity associated with the source or destination.
          properties:
            name:
              type: string
              description: ' The name of the entity (for users) or the official name (for organizations).'
            documentNumber:
              type: string
              description: >-
                The document number associated with the entity for
                identification purposes.
            externalId:
              type: string
              description: External reference ID (client purpose).
            lastname:
              type: string
              description: The last name of the user (if applicable).
        metadata:
          type: object
          description: >-
            Additional metadata related to the transaction source or
            destination.
          properties:
            image:
              type: string
              description: An image representing the source or destination.
            description:
              type: string
              description: A brief description of the source or destination.
            category:
              type: string
              description: The category or grouping of the source or destination.
          required:
            - image
            - description
            - category
      required:
        - type
        - currency
    node-identity:
      description: Identity reference object used inside account nodes.
      type: object
      properties:
        identityId:
          type: string
          description: User unique identifier
        name:
          type: string
          description: User name
        lastname:
          type: string
          description: User lastname
        nickname:
          type: string
          description: User nickname
        documentNumber:
          type: string
          description: User DNI
        entityType:
          type: string
          description: Entity type of identity
      additionalProperties: false
