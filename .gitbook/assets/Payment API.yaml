                      firstName:
                        type: string
                        description: Payer's name
                      email:
                        type: string
                        description: Payer's email
                      lastName:
                        type: string
                        description: Payer's last name
                      phoneNumber:
                        type: string
                        description: Payer's phone number without prefix
                      phoneNumberPrefix:
                        type: string
                        description: Phone number prefix (e.g., +57)
                      documentType:
                        $ref: '#/components/schemas/document-type'
                      documentNumber:
                        type: string
                        description: The document number associated with the documentType
                      address:
                        $ref: '#/components/schemas/address'
                    nullable: true
                  createdAt:
                    type: string
                    description: 'When the link expires '
                    format: date-time
                  destinations:
                    type: array
                    items:
                      $ref: '#/components/schemas/payment-link-destination'
                    description: A list of destinations for the transaction.
                    minItems: 1
                  duration:
                    type: integer
                    description: >-
                      Amount of seconds for payment link to be inactivated after
                      creation
                    minimum: 30
                  customerRequirements:
                    type: array
                    items:
                      type: string
                      description: customer fields to require on checkout
                      enum:
                        - firstName
                        - email
                        - lastName
                        - phoneNumber
                        - phoneNumberPrefix
                        - address
                        - documentNumber
                        - documentType
                  owner:
                    description: owner of who created the payment link
                    $ref: '#/components/schemas/node-identity'
                  successUrl:
                    type: string
                    description: >-
