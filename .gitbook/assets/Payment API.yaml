  /checkout-sessions:
    post:
      summary: Create checkout session
      deprecated: false
      description: Creates a checkout session for a payment link.
      operationId: refresh-checkout-session
      tags:
        - Checkout-sessions
      parameters:
        - name: x-api-key
          in: header
          description: >-
            The API key used for authentication when making requests to the API
            Gateway.
          required: true
          example: ''
          schema:
            type: string
        - name: User-Agent
          in: header
          description: Identifies the application making the request.
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-checkout-session'
            examples: {}
      responses:
        '201':
          description: Resource created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    $ref: '#/components/schemas/_id'
                  paymentLinkId:
                    type: string
                    description: Reference Payment Link ID
                  checkoutToken:
                    type: string
                    description: Reference for checkout url
                  paymentConfigs:
                    type: array
                    items:
                      $ref: '#/components/schemas/currency-config'
                  createdAt:
                    type: string
                    description: 'When the link expires '
                    format: date-time
                  status:
                    description: >-
                      Whether the payment link’s url is active. If false,
                      customers visiting the URL will be shown a page saying
                      that the link has been deactivated
                    $ref: '#/components/schemas/checkout-session-status'
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        preTaxAmount:
                          type: string
                          description: The amount of the item
                        totalAmount:
                          type: string
                          description: amount + tax.amount, if no tax it's equal to amount
                        description:
                          type: string
                          description: The description of the item
                        tax:
                          type: object
                          properties:
                            name:
                              type: string
                              description: The name of the fee.
                            type:
                              description: >-
                                The type of fee applied (e.g., FIXED,
                                PERCENTAGE).
                              $ref: '#/components/schemas/fee-type'
                            value:
                              type: string
                              description: The value of the fee.
                            amount:
                              type: string
                              description: The calculated amount of the fee.
                          required:
                            - name
                            - type
                            - value
                            - amount
                          nullable: true
                      required:
                        - preTaxAmount
                        - totalAmount
                        - description
                    description: List of items to pay for
                  currency:
                    $ref: '#/components/schemas/currency'
                    description: Currency for payment
                  preTaxAmount:
                    type: string
                    description: Addition of all items preTaxAmounts
                  totalAmount:
                    type: string
                    description: Addition of all items totalAmounts
                  url:
                    type: string
                    description: Url to open checkout flow
                  paymentMethodsAllowed:
                    type: array
                    items:
                      $ref: '#/components/schemas/payment-node-type'
                    description: Allowed payment methods.
                    minItems: 1
                  customer:
                    description: Optional customer to pass into the checkout session
                    type: object
                    properties:
                      id:
                        $ref: '#/components/schemas/_id'
                      firstName:
                        type: string
                        description: Payer's name
                      email:
                        type: string
                        description: Payer's email
                      lastName:
                        type: string
                        description: Payer's last name
                      phoneNumber:
                        type: string
                        description: Payer's phone number without prefix
                      phoneNumberPrefix:
                        type: string
                        description: Phone number prefix (e.g., +57)
                      documentType:
                        $ref: '#/components/schemas/document-type'
                      documentNumber:
                        type: string
                        description: The document number associated with the documentType
                      address:
                        $ref: '#/components/schemas/address'
                    nullable: true
                  redirectUrl:
                    type: string
                    description: >-
                      The URL to which the end user will be redirected after
                      completing the payment. 
                  destinations:
                    type: array
                    items:
                      $ref: '#/components/schemas/payment-link-destination'
                    description: A list of destinations for the transaction.
                    minItems: 1
                  customerRequirements:
                    type: array
                    items:
                      type: string
                      description: customer fields to require on checkout
                      enum:
                        - firstName
                        - email
                        - lastName
                        - phoneNumber
                        - phoneNumberPrefix
                        - address
                        - documentNumber
                        - documentType
                  expiresAt:
                    type: string
                    format: date-time
                  owner:
                    $ref: '#/components/schemas/node-identity'
                    description: owner of who created the session
                required:
                  - id
                  - paymentConfigs
                  - createdAt
                  - status
                  - items
                  - currency
                  - preTaxAmount
                  - totalAmount
                  - url
                  - paymentMethodsAllowed
                  - destinations
                  - expiresAt
                  - owner
          headers: {}
        '400':
          $ref: '#/components/responses/Bad request'
          description: Invalid request parameters or payload.
        '500':
          $ref: '#/components/responses/Internal server error'
          description: Unexpected internal server error.
