  /settlement/transactions:
    post:
      summary: Process and reconcile external transactions
      deprecated: false
      description: >-
        This endpoint processes a batch of external transactions and compares
        them against internal transactions with `CAPTURED` status from the past
        24 hours.

        It performs the following steps:
                1. Retrieves all internal CAPTURED transactions from the checked point.
                2. Matches external transactions against internal ones by ID.
                3. Validates total amounts and marks discrepancies.
                4. Flags missing or invalid transactions as `FAILED`.
                5. Generates a reconciliation report in ISO 20022 format.
                6. Returns a list of issues found (successful transactions are not listed).
      tags:
        - Settlement-transactions
        - Settlement
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transactions:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        $ref: '#/components/schemas/_id'
                      externalId:
                        type: string
                        description: External reference identifier for integrations.
                      identityId:
                        type: string
                        description: >-
                          Identifier linking the transaction to a specific user
                          or organization.
                      identityExternalId:
                        type: string
                        description: >-
                          External reference identifier for the identity
                          associated with the transaction.
                      accountNumber:
                        type: string
                        description: The account number involved in the transaction.
                      totalAmount:
                        type: string
                        description: The total amount of the transaction.
                      currency:
                        $ref: '#/components/schemas/currency'
                      description:
                        type: string
                        description: A brief description of the transaction.
                      product:
                        type: string
                        description: >-
                          The product or service related to the transaction.
                          purchaseCurrency:Currency
                      status:
                        type: string
                        description: >-
                          The current status of the transaction (e.g., PENDING,
                          AUTHORIZED, CAPTURED, ATTEMPT, REFUNDED).
                      type:
                        $ref: '#/components/schemas/payment-type'
                      purchaseAmount:
                        type: string
                        description: The amount paid in the transaction.
                      purchaseCurrency:
                        $ref: '#/components/schemas/currency'
                      fees:
                        type: array
                        description: A list of fees associated with the transaction.
                        items:
                          $ref: '#/components/schemas/fee'
                      createdAt:
                        type: string
                        description: Timestamp indicating when the transaction was created.
                      updatedAt:
                        type: string
                        description: >-
                          Timestamp indicating the last update to the
                          transaction.
                      expiresAt:
                        type: string
                        description: >-
                          Timestamp indicating when the transaction expires, if
                          applicable.
                      capturedAt:
                        type: string
                        description: >-
                          Timestamp indicating when the transaction was
                          captured.
                      authorizedAt:
                        type: string
                        description: >-
                          Timestamp indicating when the transaction was
                          authorized.
                      refundedAt:
                        type: string
                        description: >-
                          Timestamp indicating when the transaction was
                          refunded, if applicable.
                      origins:
                        type: array
                        description: A list of sources for the transaction.
                        items:
                          $ref: '#/components/schemas/payment-node'
                      destinations:
                        type: array
                        description: A list of destinations for the transaction.
                        items:
                          $ref: '#/components/schemas/payment-node'
                      settlement:
                        type: string
                        description: Settlement period for the transaction.
                    required:
                      - id
                      - externalId
                      - totalAmount
                      - currency
                      - product
                      - type
            example: ''
      responses:
        '200':
          description: Reconciliation process completed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          headers: {}
      security:
        - BearerToken: []
