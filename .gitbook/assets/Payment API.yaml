              totalAmount:
                type: string
                description: amount + tax.amount, if no tax it's equal to amount
              description:
                type: string
                description: The description of the item
              tax:
                type: object
                properties:
                  name:
                    type: string
                    description: The name of the fee.
                  type:
                    description: The type of fee applied (e.g., FIXED, PERCENTAGE).
                    $ref: '#/components/schemas/fee-type'
                  value:
                    type: string
                    description: The value of the fee.
                  amount:
                    type: string
                    description: The calculated amount of the fee.
                required:
                  - name
                  - type
                  - value
                  - amount
                nullable: true
            required:
              - preTaxAmount
              - totalAmount
              - description
          description: List of items to pay for
        currency:
          $ref: '#/components/schemas/currency'
          description: Currency for payment
        paymentMethodsAllowed:
          type: array
          items:
            $ref: '#/components/schemas/payment-node-type'
          description: Allowed payment methods.
          minItems: 1
        customer:
          description: Optional customer to pass into the checkout session
          type: object
          properties:
            id:
              $ref: '#/components/schemas/_id'
            firstName:
              type: string
              description: Payer's name
            email:
              type: string
              description: Payer's email
            lastName:
              type: string
              description: Payer's last name
            phoneNumber:
              type: string
              description: Payer's phone number without prefix
            phoneNumberPrefix:
              type: string
              description: Phone number prefix (e.g., +57)
            documentType:
              $ref: '#/components/schemas/document-type'
            documentNumber:
              type: string
              description: The document number associated with the documentType
            address:
              $ref: '#/components/schemas/address'
          nullable: true
        destinations:
          type: array
          items:
            $ref: '#/components/schemas/payment-link-destination'
          description: A list of destinations for the transaction.
          minItems: 1
        duration:
          type: integer
          description: Amount of seconds for payment link to be inactivated after creation
          minimum: 30
        customerRequirements:
          type: array
          items:
            type: string
            description: customer fields to require on checkout
            enum:
              - firstName
              - email
              - lastName
              - phoneNumber
              - phoneNumberPrefix
              - address
              - documentNumber
              - documentType
        owner:
          description: owner of who created the payment link
          $ref: '#/components/schemas/node-identity'
        successUrl:
          type: string
          description: >-
            The URL to which the end user will be redirected after successful
            payment completion.
        failedUrl:
          type: string
          description: >-
            The URL to which the end user will be redirected after failed
            payment or cancellation.
      required:
        - checkoutToken
        - items
        - currency
        - paymentMethodsAllowed
        - destinations
        - duration
        - owner
    _id:
      type: string
      description: Unique identifier for the internal service.
    country:
      type: string
      description: >-
        Country of operations for the entity, specified using the ISO 3166-1
        alpha-3 standard (e.g., `CHL`, `USA`, `MEX`). Go to the [countries
        page](../home/countries "mention") for the complete list of supported
        values.
    account:
      type: object
      description: >-
        Schema representing an internal account used for handling financial
        operations within the system.
      properties:
        id:
          description: Unique identifier for the internal account.
          $ref: '#/components/schemas/_id'
        identityId:
          type: string
          description: Identifier linking the internal account to an organization or user.
        externalId:
          type: string
          description: External reference identifier for integrations.
        type:
          description: The type of internal account.
          $ref: '#/components/schemas/account-type'
        custody:
          type: string
          description: Indicates the custody type managing the internal account.
        balance:
          type: string
          pattern: ^\d+(\.\d+)?$
          description: Total balance available in the internal account.
        availableFunds:
          type: string
          pattern: ^\d+(\.\d+)?$
          description: Amount of funds available for transactions.
        currency:
          description: >-
            The currency in which the internal account operates. Please check
            "currencies" page.
          $ref: '#/components/schemas/currency'
        name:
          type: string
          description: A friendly name assigned to the internal account.
        accountNumber:
          type: string
          description: Internal reference number for the account.
        accountHolder:
          type: string
          description: Name of the entity or user owning the internal account.
        status:
          type: string
          description: The current status of the account (e.g., PENDING, ACTIVE, BLOCKED).
        parentId:
          type: string
          description: Identifier of the parent account if this is a sub-account.
        subAccounts:
          type: object
          description: Details of sub-accounts associated with this internal account.
          properties:
            balance:
              type: string
              pattern: ^\d+(\.\d+)?$
              description: Total balance of the sub-account.
            availableFunds:
              type: string
              pattern: ^\d+(\.\d+)?$
              description: Funds available for use within the sub-account.
          required:
            - balance
            - availableFunds
        custodyBankAccount:
          type: object
          description: Details of the custody bank account linked to this internal account.
          properties:
            accountNumber:
              type: string
              description: The bank account number.
            bank:
              type: string
              description: The name of the bank where the account is held.
            currency:
              $ref: '#/components/schemas/currency'
            typeAccount:
              type: string
              description: The type of bank account. CHECKING_ACOUNT, SAVINGS
            country:
              $ref: '#/components/schemas/country'
          required:
            - accountNumber
            - bank
            - currency
            - country
      required:
        - identityId
        - externalId
        - type
        - custody
        - balance
        - availableFunds
        - currency
        - name
        - accountNumber
        - accountHolder
        - status
        - parentId
        - id
    wallet:
      description: Crypto wallet node payload for pay-ins or payouts.
      type: object
      properties:
        provider:
          type: string
          description: Optional provider identifier.
        referenceId:
          type: string
          description: Optional external wallet id in the provider system.
        token:
          type: string
          description: Optional token symbol (e.g., `USDC`, `USDT`).
        network:
          type: string
          description: Optional blockchain network (e.g., `ETH`, `TRON`, `SOLANA`).
        address:
          type: string
          description: Wallet address used to receive or send funds.
      required:
        - address
    pagination:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/pagination-cursor'
          description: Pagination cursor object
        results:
          type: array
          items:
            type: object
            properties: {}
          description: Items from the current page
      required:
        - results
        - pagination
      description: >-
        An object containing pagination metadata that helps navigate through the
        dataset.
    pagination-cursor:
      description: Cursor-based pagination metadata (`limit`, `cursor`, `hasMore`).
      type: object
      properties:
        count:
          type: integer
          description: count of items shown up to the moment
        next:
          type: integer
          description: next cursor to be used in offset to display the next page
        previous:
          type: integer
          description: previous cursor to be used in offset to display the previous page
        total:
          type: integer
          description: total count of items to be shown
      required:
        - next
        - previous
        - total
        - count
    account-type:
      type: string
      description: The type of internal account.
      enum:
        - CHECKING
        - ASSET
        - SAVINGS
        - ESCROW
        - FEE
      x-enumDescriptions:
        CHECKING: Fiat liquid account used for spending, withdrawals, or operations.
        ASSET: Tracks non-operational or financial assets.
        SAVINGS: Holds funds intended for savings or long-term storage.
        ESCROW: Temporary routing account for incoming funds.
        FEE: Holds all fees collected via FEE or FEE_INVOICE.
    document-type:
      type: string
      description: >-
        Documeny type of the entity (e.g., `RUT`, `CURP`, `CURL`). Go to the
        [Supported Identity document types
        page](../home/supported-identity-document-types "mention") for the
        complete list of supported values.
    currency:
      type: string
      description: >-
        Specifies the currency used, following the ISO 4217 standard for fiat
        currencies (e.g., `CLP`, `ARS`, `MXN`). Go to the [currencies
        page](../home/currencies "mention") for the complete list of supported
        values.
    fee:
      type: object
      description: Details about any fees applied to the transaction.
      properties:
        name:
          type: string
          description: The name of the fee.
        type:
          description: The type of fee applied (e.g., FIXED, PERCENTAGE).
          $ref: '#/components/schemas/fee-type'
        value:
          type: string
          description: The value of the fee.
        amount:
          type: string
          description: The calculated amount of the fee.
        currency:
          $ref: '#/components/schemas/currency'
      required:
        - name
        - type
        - value
        - currency
        - amount
    fee-type:
      type: string
      description: Type of fee
      enum:
        - FIXED
        - PERCENTAGE
    error:
      type: object
      description: Standard error response payload.
      properties:
        statusCode:
          type: integer
          description: HTTP status code.
        error:
          type: string
          description: Error category.
        message:
          type: string
          description: Human-readable error message.
      required:
        - statusCode
        - error
        - message
  responses:
    Bad request:
      description: The request is invalid, malformed, or contains unsupported values.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    Internal server error:
      description: The server failed to process the request due to an unexpected condition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    Not Found:
      description: The requested resource does not exist or is not accessible with the provided identifiers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
    bearer:
      type: http
      scheme: bearer
servers: []
security:
  - BearerToken: []
